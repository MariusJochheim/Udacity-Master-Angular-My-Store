<section class="cart-page" aria-labelledby="cart-heading">
  <h1 id="cart-heading">Shopping Cart</h1>

  <p class="cart-message" *ngIf="cartMessage" role="status">
    {{ cartMessage }}
  </p>

  <div class="empty-cart-message" *ngIf="cartItems().length === 0">
    <p>Your cart is empty. <a routerLink="/">Continue shopping</a>.</p>
  </div>

  <div class="cart-container" *ngIf="cartItems().length > 0">
    <div class="cart-panel">
      <div class="cart-item" *ngFor="let item of cartItems()">
        <img [src]="item.product.url" [alt]="item.product.name" />

        <div class="cart-item-details">
          <h2>{{ item.product.name }}</h2>
          <p>{{ item.product.price | currency }}</p>
          <label>
            Quantity
            <input
              class="number-input"
              type="number"
              min="0"
              name="quantity-{{ item.product.id }}"
              [(ngModel)]="item.quantity"
              (ngModelChange)="onQuantityChange(item.product.id, $event)"
            />
          </label>
          <button type="button" (click)="removeItem(item.product.id, item.product.name)">
            Remove
          </button>
        </div>
      </div>

      <h2>Total: {{ cartTotal() | currency }}</h2>
    </div>

    <form class="cart-panel" #checkoutForm="ngForm" (ngSubmit)="submitOrder(checkoutForm)">
      <h2>Checkout</h2>

      <div class="form-margin">
        <label for="fullName">Full name</label>
        <input
          id="fullName"
          name="fullName"
          type="text"
          required
          minlength="3"
          [(ngModel)]="checkoutInfo.fullName"
        />
        <p class="validation-message" *ngIf="checkoutForm.submitted && checkoutForm.controls['fullName']?.invalid">
          Enter a name with at least 3 characters.
        </p>
      </div>

      <div class="form-margin">
        <label for="address">Address</label>
        <input
          id="address"
          name="address"
          type="text"
          required
          minlength="6"
          [(ngModel)]="checkoutInfo.address"
        />
        <p class="validation-message" *ngIf="checkoutForm.submitted && checkoutForm.controls['address']?.invalid">
          Enter a valid shipping address.
        </p>
      </div>

      <div class="form-margin">
        <label for="creditCard">Credit card</label>
        <input
          id="creditCard"
          name="creditCard"
          type="text"
          required
          pattern="^[0-9 ]{13,19}$"
          placeholder="1111 2222 3333 4444"
          [(ngModel)]="checkoutInfo.creditCard"
        />
        <p class="validation-message" *ngIf="checkoutForm.submitted && checkoutForm.controls['creditCard']?.invalid">
          Enter 13 to 19 digits.
        </p>
      </div>

      <button type="submit">Submit order</button>
    </form>
  </div>
</section>
